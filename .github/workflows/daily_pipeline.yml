name: NeoSignal Daily Report — 9 AM IST

on:
  schedule:
    - cron: '30 3 * * *'   # 09:00 AM IST (UTC+5:30) every day
  workflow_dispatch:         # also triggerable manually from Actions tab

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system fonts (required for Unicode PDF)
        run: sudo apt-get install -y fonts-dejavu-core

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Prepare directories
        run: mkdir -p data reports

      - name: Run scraper
        run: python -m src.scraper

      - name: Validate scraper output
        run: |
          if [ ! -f data/news_feed.json ]; then
            echo "::error::Scraper did not produce data/news_feed.json"
            exit 1
          fi
          ARTICLE_COUNT=$(python -c "import json; d=json.load(open('data/news_feed.json')); print(d['meta']['article_count'])")
          echo "Article count: $ARTICLE_COUNT"
          echo "ARTICLE_COUNT=$ARTICLE_COUNT" >> $GITHUB_ENV

      - name: Generate PDF report
        run: python -m src.pdf_generator

      - name: Validate PDF was created
        if: env.ARTICLE_COUNT != '0'
        run: |
          PDF_COUNT=$(ls reports/*.pdf 2>/dev/null | wc -l)
          if [ "$PDF_COUNT" -eq 0 ]; then
            echo "::error::PDF generation failed — no PDF in reports/"
            exit 1
          fi
          echo "PDF OK — $PDF_COUNT report(s) in reports/"

      - name: Commit and push report to repo
        run: |
          git config --global user.name  "NeoSignal Bot"
          git config --global user.email "neosignal@users.noreply.github.com"
          # Force-add: bypasses any accidental gitignore entries
          git add -f data/news_feed.json reports/ history.log || true
          if git diff --cached --quiet; then
            echo "Nothing new to commit — all articles already reported."
          else
            IST_DATE=$(TZ='Asia/Kolkata' date +'%Y-%m-%d %I:%M %p IST')
            git commit -m "report: NeoSignal daily — $IST_DATE"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            echo "Report committed and pushed."
          fi

      - name: Upload debug artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: |
            data/
            reports/
