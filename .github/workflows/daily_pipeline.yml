name: NeoSignal Daily Report — 9 AM IST

on:
  schedule:
    - cron: '30 3 * * *'   # 09:00 AM IST (UTC+5:30) every day
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Python & system deps ─────────────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system fonts (required for Unicode PDF)
        run: sudo apt-get install -y fonts-dejavu-core

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Pipeline ─────────────────────────────────────────────────────────────
      - name: Prepare directories
        run: mkdir -p data reports archive

      - name: Run multi-source scraper
        run: python -m src.scraper

      - name: Validate scraper output
        id: scraper
        run: |
          if [ ! -f data/news_feed.json ]; then
            echo "::error::Scraper did not produce data/news_feed.json"
            exit 1
          fi
          ARTICLE_COUNT=$(python - <<'PY'
          import json, sys
          d = json.load(open("data/news_feed.json"))
          print(d["meta"]["article_count"])
          PY
          )
          RAW_COUNT=$(python - <<'PY'
          import json, sys
          d = json.load(open("data/news_feed.json"))
          print(d["meta"].get("raw_count", 0))
          PY
          )
          echo "articles=$ARTICLE_COUNT" >> "$GITHUB_OUTPUT"
          echo "raw_count=$RAW_COUNT"
          echo "article_count=$ARTICLE_COUNT"
          echo "ARTICLE_COUNT=$ARTICLE_COUNT" >> "$GITHUB_ENV"

      - name: Generate PDF report
        run: python -m src.pdf_generator

      - name: Validate PDF
        id: pdf
        run: |
          PDF_PATH=$(ls -t reports/neosignal_*.pdf 2>/dev/null | head -1)
          if [ -z "$PDF_PATH" ]; then
            echo "::error::No PDF found in reports/ after generation"
            exit 1
          fi
          PDF_SIZE=$(stat -c%s "$PDF_PATH")
          echo "path=$PDF_PATH"   >> "$GITHUB_OUTPUT"
          echo "size=$PDF_SIZE"
          echo "PDF_PATH=$PDF_PATH" >> "$GITHUB_ENV"
          echo "PDF generated: $PDF_PATH ($PDF_SIZE bytes)"

      # ── Email delivery (skipped gracefully if secrets not configured) ─────────
      - name: Check email secrets
        id: email_check
        run: |
          if [ -n "$_TO" ] && [ -n "$_USER" ] && [ -n "$_PASS" ]; then
            echo "ready=true"  >> "$GITHUB_OUTPUT"
            echo "Email secrets configured — will send report."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Email secrets not configured — skipping email. See .github/EMAIL_SETUP.md"
          fi
        env:
          _TO:   ${{ secrets.EMAIL_TO }}
          _USER: ${{ secrets.EMAIL_USERNAME }}
          _PASS: ${{ secrets.EMAIL_PASSWORD }}

      - name: Send PDF by email
        if: steps.email_check.outputs.ready == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: ${{ secrets.EMAIL_TO }}
          from: NeoSignal Bot <${{ secrets.EMAIL_USERNAME }}>
          subject: "NeoSignal Daily — ${{ steps.scraper.outputs.articles }} AI stories — ${{ env.IST_DATE }}"
          body: |
            Good morning!

            Your NeoSignal AI Intelligence Report is attached.

            Today's summary
            ───────────────
            Stories verified:  ${{ steps.scraper.outputs.articles }}
            Raw scraped:       ${{ steps.scraper.outputs.raw_count }}
            PDF size:          ${{ steps.pdf.outputs.size }} bytes

            Sources: HackerNews, Reddit ×4, TechCrunch AI, VentureBeat AI,
                     MIT Tech Review, The Verge AI, Wired AI, ArXiv CS.AI

            Authenticity tiers
            ───────────────────
            VERIFIED  (80-100%) — covered by 3+ independent sources
            CONFIRMED (50-79%)  — covered by 2 sources
            EMERGING  (25-49%)  — single source, passes AI keyword filter

            — NeoSignal Bot
          attachments: ${{ steps.pdf.outputs.path }}

      # ── Commit report to repository ──────────────────────────────────────────
      - name: Set IST timestamp
        run: |
          echo "IST_DATE=$(TZ='Asia/Kolkata' date +'%Y-%m-%d %I:%M %p IST')" >> "$GITHUB_ENV"

      - name: Commit and push report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "NeoSignal Bot"
          git config user.email "neosignal@users.noreply.github.com"

          # Update remote URL to use the Actions token (avoids credential conflicts)
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # Sync with remote before committing (prevents push rejection)
          git fetch origin main
          git rebase origin/main

          # Stage CI-generated files
          git add -f data/news_feed.json reports/ history.log 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No new content to commit."
          else
            git commit -m "report: NeoSignal daily — ${{ env.IST_DATE }} — ${{ steps.scraper.outputs.articles }} stories"
            git push origin main
            echo "Report committed and pushed successfully."
          fi

      # ── Debug artefacts on any failure ───────────────────────────────────────
      - name: Upload debug artefacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: |
            data/
            reports/
          retention-days: 7
