name: Generate Weekly Executive Summary

on:
  schedule:
    - cron: '0 23 * * 0'  # Every Sunday at 23:00 UTC
  workflow_dispatch:

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install fpdf2
      
      - name: Generate Weekly Digest
        run: python scripts/weekly_digest.py
      
      - name: Upload Digest as Artifact
        uses: actions/upload-artifact@v3
        with:
          name: weekly-digest
          path: archive/*/*.pdf
      
      - name: Commit and Push Archive
        run: |
          git config --global user.name "NeoCodeSmith"
          git config --global user.email "120089461+NeoCodeSmith@users.noreply.github.com"
          git add archive/
          git commit -m "chore: update weekly digest archive"
          git push