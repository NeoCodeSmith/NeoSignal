name: NeoSignal Weekly Digest — Sunday 9 PM IST

on:
  schedule:
    - cron: '30 15 * * 0'  # 09:00 PM IST every Sunday
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system fonts
        run: sudo apt-get install -y fonts-dejavu-core

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate weekly digest
        run: python -m src.digest

      - name: Set IST date
        run: echo "IST_DATE=$(TZ='Asia/Kolkata' date +'%Y-%m-%d %I:%M %p IST')" >> $GITHUB_ENV

      - name: Email weekly digest
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: ${{ secrets.EMAIL_TO }}
          from: NeoSignal Bot <${{ secrets.EMAIL_USERNAME }}>
          subject: "NeoSignal Weekly Digest — AI Intelligence Summary"
          body: |
            Your weekly NeoSignal AI intelligence digest is attached.

            This digest covers the top AI stories from the past 7 days,
            categorised into:
              • Model Releases & Research
              • Strategic & Business
              • Safety & Regulation
              • Tools & Engineering

            — NeoSignal Bot
          attachments: archive/**/*.pdf
        continue-on-error: true

      - name: Commit digest archive
        run: |
          git config --global user.name  "NeoSignal Bot"
          git config --global user.email "neosignal@users.noreply.github.com"
          git pull --rebase https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main
          git add -f archive/ || true
          git diff --cached --quiet && echo "Nothing to commit." || (
            git commit -m "digest: NeoSignal weekly — ${{ env.IST_DATE }}" &&
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main
          )
