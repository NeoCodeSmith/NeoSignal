name: NeoSignal Weekly Digest — Sunday 9 PM IST

on:
  schedule:
    - cron: '30 15 * * 0'  # 09:00 PM IST (UTC+5:30) every Sunday
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system fonts
        run: sudo apt-get install -y fonts-dejavu-core

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate weekly digest
        run: python -m src.digest

      - name: Upload digest as artefact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-digest-${{ github.run_id }}
          path: archive/**/*.pdf
          if-no-files-found: warn

      - name: Commit digest to archive
        run: |
          git config --global user.name  "NeoSignal Bot"
          git config --global user.email "neosignal@users.noreply.github.com"
          git add -f archive/ || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            IST_DATE=$(TZ='Asia/Kolkata' date +'%Y-%m-%d %I:%M %p IST')
            git commit -m "digest: NeoSignal weekly — $IST_DATE"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          fi
