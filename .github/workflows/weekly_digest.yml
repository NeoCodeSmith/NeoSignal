name: NeoSignal Weekly Digest — Sunday 9 PM IST

on:
  schedule:
    - cron: '30 15 * * 0'   # 09:00 PM IST every Sunday (UTC+5:30)
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system fonts (required for Unicode PDF)
        run: sudo apt-get install -y fonts-dejavu-core

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Prepare directories
        run: mkdir -p data reports archive

      - name: Run scraper (refresh this week's data)
        run: python -m src.scraper

      - name: Generate weekly digest
        id: digest
        run: |
          python -m src.digest
          DIGEST_PATH=$(find archive -name "*.pdf" | sort | tail -1)
          if [ -z "$DIGEST_PATH" ]; then
            echo "::error::Digest PDF was not created"
            exit 1
          fi
          echo "path=$DIGEST_PATH" >> "$GITHUB_OUTPUT"
          echo "Digest: $DIGEST_PATH"

      # ── Email delivery (skipped gracefully if secrets not configured) ─────────
      - name: Check email secrets
        id: email_check
        run: |
          if [ -n "$_TO" ] && [ -n "$_USER" ] && [ -n "$_PASS" ]; then
            echo "ready=true"  >> "$GITHUB_OUTPUT"
            echo "Email secrets configured — will send digest."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Email secrets not configured — skipping email. See .github/EMAIL_SETUP.md"
          fi
        env:
          _TO:   ${{ secrets.EMAIL_TO }}
          _USER: ${{ secrets.EMAIL_USERNAME }}
          _PASS: ${{ secrets.EMAIL_PASSWORD }}

      - name: Send weekly digest by email
        if: steps.email_check.outputs.ready == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          to: ${{ secrets.EMAIL_TO }}
          from: NeoSignal Bot <${{ secrets.EMAIL_USERNAME }}>
          subject: "NeoSignal Weekly Digest — AI Intelligence Summary"
          body: |
            Your weekly NeoSignal AI intelligence digest is attached.

            This digest covers the top AI stories from the past 7 days,
            categorised into four intelligence domains:

              • Model Releases & Research
              • Strategic & Business
              • Safety & Regulation
              • Tools & Engineering

            Each story includes a summary, authenticity score, and source attribution.

            — NeoSignal Bot
          attachments: ${{ steps.digest.outputs.path }}

      # ── Commit digest archive ─────────────────────────────────────────────────
      - name: Set IST timestamp
        run: |
          echo "IST_DATE=$(TZ='Asia/Kolkata' date +'%Y-%m-%d %I:%M %p IST')" >> "$GITHUB_ENV"

      - name: Commit and push digest archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "NeoSignal Bot"
          git config user.email "neosignal@users.noreply.github.com"

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git fetch origin main
          git rebase origin/main

          git add -f archive/ data/news_feed.json history.log 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No new content to commit."
          else
            git commit -m "digest: NeoSignal weekly — ${{ env.IST_DATE }}"
            git push origin main
            echo "Digest committed and pushed successfully."
          fi

      - name: Upload debug artefacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: digest-debug-${{ github.run_id }}
          path: |
            data/
            archive/
          retention-days: 7
